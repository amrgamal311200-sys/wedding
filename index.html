```html id="prowedding"
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amr & Heba Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Playfair Display', serif;
    background:linear-gradient(135deg,#f7f3ee,#e7d9c7);
    text-align:center;
    color:#4a3b2f;
}

/* Top hero */
.hero{
    padding:60px 20px;
    background:url('https://images.unsplash.com/photo-1529634891791-7a5b5a7a7a7a') center/cover;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.5);
    padding:60px 20px;
}

h1{
    font-size:55px;
    margin:10px 0;
    color:#fff;
}

h2{
    font-weight:normal;
}

/* Card */
.card{
    background:white;
    max-width:850px;
    margin:-50px auto 30px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

/* Countdown */
.countdown{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.box{
    background:#b08a5a;
    color:white;
    padding:15px;
    border-radius:10px;
    min-width:80px;
}

/* Buttons */
.btn{
    display:inline-block;
    padding:12px 18px;
    margin:10px;
    border-radius:10px;
    background:#b08a5a;
    color:white;
    text-decoration:none;
}

/* RSVP */
input, select{
    padding:10px;
    margin:5px;
    width:80%;
    max-width:300px;
    border-radius:8px;
    border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="hero">
<div class="overlay">
    <h2>Wedding Invitation</h2>
    <h1>Amr ♥ Heba</h1>
    <p>We are delighted to invite you</p>
</div>
</div>

<div class="card">

<!-- Info -->
<h2>📅 1 / 1 / 2027</h2>
<h2>🕘 9:00 PM</h2>
<h2>📍 Armed Forces Hall - Benha</h2>

<hr>

<!-- Countdown -->
<h3>Countdown to Wedding</h3>
<div class="countdown">
<div class="box"><span id="days">0</span><br>Days</div>
<div class="box"><span id="hours">0</span><br>Hours</div>
<div class="box"><span id="minutes">0</span><br>Min</div>
<div class="box"><span id="seconds">0</span><br>Sec</div>
</div>

<hr>

<!-- Map -->
<a class="btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Armed%20Forces%20Hall%20Benha">
Open Map 📍
</a>

<!-- Music -->
<br>
<audio controls autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<hr>

<!-- RSVP -->
<h3>RSVP</h3>

<input id="name" placeholder="Your Name"><br>
<select id="attend">
<option value="Yes">Will Attend</option>
<option value="No">Cannot Attend</option>
</select><br>
<input id="guests" placeholder="Number of Guests"><br>

<button class="btn" onclick="rsvp()">Submit</button>
<p id="msg"></p>

<hr>

<p>We look forward to celebrating with you 💛</p>

</div>

<script>

var weddingDate = new Date("Jan 1, 2027 21:00:00").getTime();

setInterval(function(){
    var now = new Date().getTime();
    var distance = weddingDate - now;

    document.getElementById("days").innerText = Math.floor(distance/(1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    document.getElementById("minutes").innerText = Math.floor((distance%(1000*60*60))/(1000*60));
    document.getElementById("seconds").innerText = Math.floor((distance%(1000*60))/1000);

},1000);

function rsvp(){
    var name = document.getElementById("name").value;
    var attend = document.getElementById("attend").value;
    var guests = document.getElementById("guests").value;

    if(name){
        document.getElementById("msg").innerHTML =
        "Thank you " + name + " 💛 (" + attend + ", Guests: " + guests + ")";
    } else {
        document.getElementById("msg").innerHTML =
        "Please enter your name";
    }
}

</script>

</body>
</html>
```
