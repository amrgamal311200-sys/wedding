```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amr & Heba Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Playfair Display', serif;
    color:white;
    text-align:center;
}

/* BACKGROUND */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('123.jpg') center/cover no-repeat;
    filter:blur(6px) brightness(0.4);
    transform:scale(1.1);
    z-index:-1;
}

/* CARD */
.card{
    max-width:850px;
    margin:60px auto;
    background:rgba(0,0,0,0.6);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

/* TITLE */
h1{
    font-size:50px;
    margin:10px 0;
    color:#f5d7a1;
}

h2{
    font-weight:normal;
}

/* IMAGE */
.profile{
    width:150px;
    height:150px;
    border-radius:50%;
    border:3px solid #f5d7a1;
    object-fit:cover;
    margin-top:10px;
}

/* COUNTDOWN */
.countdown{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.box{
    background:#b08a5a;
    padding:12px;
    border-radius:10px;
    min-width:80px;
}

/* INPUT */
input, select{
    padding:10px;
    margin:5px;
    width:80%;
    max-width:300px;
    border-radius:8px;
    border:none;
}

/* BUTTON */
.btn{
    display:inline-block;
    padding:12px 18px;
    margin-top:10px;
    border-radius:10px;
    background:#b08a5a;
    color:white;
    border:none;
    cursor:pointer;
}

/* MUSIC BUTTON */
.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#b08a5a;
    color:white;
    border:none;
    padding:12px 16px;
    border-radius:50px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="playMusic()">
🎵 Music
</button>

<div class="card">

<h2>Wedding Invitation</h2>
<h1>Amr ♥ Heba</h1>

<img src="123.jpg" class="profile">

<div class="section">
We are delighted to invite you to our wedding celebration
</div>

<div class="section">
📅 1 / 1 / 2027 <br>
🕘 9:00 PM <br>
📍 Armed Forces Hall - Benha
</div>

<hr>

<h3>Countdown</h3>
<div class="countdown">
<div class="box"><span id="d"></span><br>Days</div>
<div class="box"><span id="h"></span><br>Hours</div>
<div class="box"><span id="m"></span><br>Min</div>
<div class="box"><span id="s"></span><br>Sec</div>
</div>

<hr>

<a class="btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Armed%20Forces%20Hall%20Benha">
Open Map 📍
</a>

<hr>

<h3>RSVP</h3>

<input id="name" placeholder="Your Name"><br>
<select id="attend">
<option>Will Attend</option>
<option>Cannot Attend</option>
</select><br>

<button class="btn" onclick="rsvp()">Submit</button>
<p id="msg"></p>

</div>

<script>

// COUNTDOWN
let wedding = new Date("Jan 1, 2027 21:00:00").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let diff = wedding - now;

    document.getElementById("d").innerText = Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText = Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText = Math.floor((diff%(1000*60))/1000);
},1000);

// RSVP
function rsvp(){
    let name = document.getElementById("name").value;
    let attend = document.getElementById("attend").value;

    if(name){
        document.getElementById("msg").innerHTML =
        "Thank you " + name + " 💛 (" + attend + ")";
    } else {
        document.getElementById("msg").innerHTML = "Please enter your name";
    }
}

// MUSIC FIX (100% works)
function playMusic(){
    let audio = document.getElementById("music");
    audio.play();
}

// autoplay attempt
window.addEventListener("load", ()=>{
    let audio = document.getElementById("music");
    audio.play().catch(()=>{});
});

</script>

</body>
</html>
```
