<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amr & Heba Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Playfair Display', serif;
    color:white;
    overflow-x:hidden;
}

/* 🎬 INTRO */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    animation:fadeOutIntro 3s ease forwards;
}
#intro h1{color:#f5d7a1;font-size:32px;}

@keyframes fadeOutIntro{
    0%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;visibility:hidden;}
}

/* 🌸 BACKGROUND */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('123.jpg') center/cover no-repeat;
    filter:blur(12px) brightness(0.35);
    transform:scale(1.1);
    z-index:-3;
}

/* 💍 ENTRY */
#entry{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}
#entry input{
    padding:12px;
    border-radius:10px;
    border:none;
    width:260px;
    text-align:center;
}
#entry button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#b08a5a;
    color:white;
}

/* 💍 MAIN CARD (MOBILE FIX) */
.card{
    width:100%;
    max-width:900px;
    margin:0 auto;
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:0;
    text-align:center;
    display:none;
    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

/* 💛 WELCOME */
#guestNameText{
    font-size:32px;
    color:#f5d7a1;
    opacity:0;
    transform:translateY(15px);
    transition:1s ease;
}
#guestNameText.show{
    opacity:1;
    transform:translateY(0);
}

/* 💍 COUPLE */
h1{
    font-size:40px;
    color:#f5d7a1;
}

/* 🎥 VIDEO */
.profile-video{
    width:100%;
    max-width:320px;
    height:auto;
    border-radius:50%;
    border:4px solid #f5d7a1;
}

/* ⏳ COUNTDOWN (FIXED) */
.countdown{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
}
.box{
    background:#b08a5a;
    padding:10px;
    border-radius:8px;
    min-width:70px;
}

/* MAP BUTTON */
.btn{
    display:inline-block;
    padding:12px 18px;
    margin-top:10px;
    border-radius:10px;
    background:#b08a5a;
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
    <h1>Wedding Invitation</h1>
</div>

<!-- 🌸 BACKGROUND -->
<div class="bg"></div>

<!-- 💍 ENTRY -->
<div id="entry">
    <h2 style="color:#f5d7a1;">Enter Your Name 💍</h2>
    <input id="guestName" placeholder="Your Name">
    <button onclick="enter()">Enter</button>
</div>

<!-- 💍 MAIN -->
<div class="card" id="main">

<h2 id="guestNameText"></h2>

<h1>Amr ♥ Heba</h1>

<video id="myVideo" class="profile-video" loop playsinline>
    <source src="wedding.mp4" type="video/mp4">
</video>

<p>﴿ مِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا ﴾</p>

<p>We are delighted to invite you</p>

<p>📅 1 / 1 / 2027 | 🕘 9:00 PM</p>
<p>📍 Jewel Plaza, Benha</p>

<hr>

<h3>Countdown</h3>
<div class="countdown">
<div class="box"><span id="d"></span><br>Days</div>
<div class="box"><span id="h"></span><br>Hours</div>
<div class="box"><span id="m"></span><br>Min</div>
<div class="box"><span id="s"></span><br>Sec</div>
</div>

<hr>

<a class="btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Jewel%20Plaza%20Benha">
Open Map 📍
</a>

</div>

<script>

/* ENTER */
function enter(){
    let name=document.getElementById("guestName").value;

    if(!name){
        alert("Enter your name");
        return;
    }

    document.getElementById("entry").style.display="none";
    document.getElementById("main").style.display="block";

    document.getElementById("guestNameText").innerText="Welcome " + name + " 💛";

    setTimeout(()=>{
        document.getElementById("guestNameText").classList.add("show");
    },200);

    // ⬇️ يبدأ من فوق مباشرة
    window.scrollTo({ top: 0, behavior: "smooth" });

    // 🎥 VIDEO unchanged
    document.getElementById("myVideo").play().catch(()=>{});
}

/* ⏳ COUNTDOWN FIXED */
let wedding=new Date("Jan 1, 2027 21:00:00").getTime();

setInterval(()=>{
    let now=new Date().getTime();
    let diff=wedding-now;

    document.getElementById("d").innerText=Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerText=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText=Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText=Math.floor((diff%(1000*60))/1000);
},1000);

</script>

</body>
</html>
