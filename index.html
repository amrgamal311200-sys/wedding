<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amr & Heba Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Playfair Display','Cairo', serif;
    color:white;
    overflow-x:hidden;
}

/* 🌸 BACKGROUND */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('123.jpg') center/cover no-repeat;
    filter:blur(12px) brightness(0.35);
    transform:scale(1.1);
    z-index:-3;
}

/* 🌸 PARTICLES */
.particles{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:-1;
}

.particles span{
    position:absolute;
    top:-10%;
    font-size:18px;
    animation:fall 10s linear infinite;
    color:#f5d7a1;
}

@keyframes fall{
    0%{transform:translateY(0);}
    100%{transform:translateY(120vh);}
}

/* 💍 ENTRY */
#entry{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}

#entry input{
    padding:12px;
    border-radius:10px;
    border:none;
    width:260px;
    text-align:center;
}

#entry button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#b08a5a;
    color:white;
    cursor:pointer;
}

/* 💍 MAIN */
.card{
    max-width:900px;
    margin:50px auto;
    background:rgba(0,0,0,0.6);
    padding:25px;
    border-radius:20px;
    text-align:center;
    display:none;
    animation:fadeIn 1.5s ease;
    box-shadow:0 0 40px rgba(245,215,161,0.15);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* ✨ VIP NAMES */
#weddingNames{
    font-family: 'Playfair Display', serif;
    font-weight:900;
    font-size:42px;
    color:#f5d7a1;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(245,215,161,0.4);
    opacity:0;
    transform:translateY(20px);
    transition:1s ease;
}

#weddingNames.show{
    opacity:1;
    transform:translateY(0);
}

/* TITLE */
h1{
    font-size:55px;
    color:#f5d7a1;
}

/* VIDEO */
.profile-video{
    width:280px;
    height:280px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #f5d7a1;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    margin-top:10px;
}

/* COUNTDOWN */
.countdown{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

.box{
    background:#b08a5a;
    padding:12px;
    border-radius:10px;
    min-width:80px;
}

/* BUTTON */
.btn{
    display:inline-block;
    padding:12px 18px;
    margin-top:10px;
    border-radius:10px;
    background:#b08a5a;
    color:white;
    text-decoration:none;
    border:none;
}
</style>
</head>

<body>

<!-- 🌸 BACKGROUND -->
<div class="bg"></div>

<!-- 🌸 PARTICLES -->
<div class="particles">
    <span style="left:10%">❀</span>
    <span style="left:30%; animation-delay:2s;">❀</span>
    <span style="left:50%; animation-delay:4s;">❀</span>
    <span style="left:70%; animation-delay:1s;">❀</span>
    <span style="left:90%; animation-delay:3s;">❀</span>
</div>

<!-- 💍 ENTRY -->
<div id="entry">
    <h2 style="color:#f5d7a1;">Enter Your Name 💍</h2>
    <input id="guestName" placeholder="Your Name">
    <button onclick="enter()">Enter</button>
</div>

<!-- 💍 MAIN -->
<div class="card" id="main">

<!-- 💍 NAMES VIP -->
<div id="weddingNames">Amr ♥ Heba</div>

<h1>Wedding Invitation</h1>

<!-- 🎥 VIDEO (UNCHANGED) -->
<video id="myVideo" class="profile-video" loop playsinline>
    <source src="wedding.mp4" type="video/mp4">
</video>

<p>
﴿ وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا ﴾
</p>

<p>We are delighted to invite you to our wedding celebration</p>

<p>📅 1 / 1 / 2027 | 🕘 9:00 PM</p>
<p>📍 Jewel Plaza, Benha</p>

<hr>

<h3>Countdown</h3>
<div class="countdown">
<div class="box"><span id="d"></span><br>Days</div>
<div class="box"><span id="h"></span><br>Hours</div>
<div class="box"><span id="m"></span><br>Min</div>
<div class="box"><span id="s"></span><br>Sec</div>
</div>

<hr>

<a class="btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Jewel%20Plaza%20Benha">
Open Map 📍
</a>

</div>

<script>

/* ENTER FUNCTION */
function enter(){
    let name=document.getElementById("guestName").value;

    if(!name){
        alert("Please enter your name");
        return;
    }

    document.getElementById("entry").style.display="none";
    document.getElementById("main").style.display="block";

    let el=document.getElementById("weddingNames");
    el.innerText="Amr ♥ Heba";

    setTimeout(()=>{
        el.classList.add("show");
    },200);

    window.scrollTo({ top: 0 });

    // 🎥 VIDEO (NO CHANGE)
    let video=document.getElementById("myVideo");
    video.play().catch(()=>{});
}

/* COUNTDOWN */
let wedding=new Date("Jan 1, 2027 21:00:00").getTime();

setInterval(()=>{
    let now=new Date().getTime();
    let diff=wedding-now;

    document.getElementById("d").innerText=Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerText=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText=Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText=Math.floor((diff%(1000*60))/1000);
},1000);

</script>

</body>
</html>
