<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amr & Heba Wedding VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Playfair Display', serif;
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('123.jpg') center/cover no-repeat;
    filter:blur(7px) brightness(0.35);
    transform:scale(1.1);
    z-index:-2;
}

/* ENTRY SCREEN */
#entry{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg, rgba(0,0,0,0.9), rgba(30,20,10,0.95));
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}

/* VIP NAME CARD */
.vip-card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 25px rgba(255,215,150,0.3);
    text-align:center;
}

#entry input{
    padding:12px;
    border-radius:10px;
    border:none;
    width:260px;
    margin-top:10px;
    text-align:center;
}

#entry button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#b08a5a;
    color:white;
    cursor:pointer;
}

/* MAIN CARD */
.card{
    max-width:850px;
    margin:60px auto;
    background:rgba(0,0,0,0.6);
    padding:30px;
    border-radius:20px;
    text-align:center;
    display:none;
}

/* TITLE */
h1{
    font-size:50px;
    color:#f5d7a1;
}

.profile{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #f5d7a1;
}

/* COUNTDOWN */
.countdown{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}
.box{
    background:#b08a5a;
    padding:12px;
    border-radius:10px;
    min-width:80px;
}

/* BUTTON */
.btn{
    display:inline-block;
    padding:12px 18px;
    margin-top:10px;
    border-radius:10px;
    background:#b08a5a;
    color:white;
    border:none;
    cursor:pointer;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- ENTRY -->
<div id="entry">
    <div class="vip-card">
        <h2>✨ Welcome to Our Wedding ✨</h2>
        <p>Enter your name to continue</p>
        <input id="guestName" placeholder="Your Name">
        <br>
        <button onclick="enter()">Enter</button>
    </div>
</div>

<!-- MAIN -->
<div class="card" id="main">

<h2 id="welcomeText">Wedding Invitation</h2>
<h1>Amr ♥ Heba</h1>

<img src="123.jpg" class="profile">

<p>We are delighted to invite you to our wedding celebration</p>

<p>📅 1 / 1 / 2027 | 🕘 9:00 PM | 📍 Benha</p>

<hr>

<h3>Countdown</h3>
<div class="countdown">
<div class="box"><span id="d"></span><br>Days</div>
<div class="box"><span id="h"></span><br>Hours</div>
<div class="box"><span id="m"></span><br>Min</div>
<div class="box"><span id="s"></span><br>Sec</div>
</div>

<hr>

<a class="btn" target="_blank"
href="https://www.google.com/maps/search/?api=1&query=Armed%20Forces%20Hall%20Benha">
Open Map 📍
</a>

<hr>

<h3>RSVP</h3>

<input id="name" placeholder="Your Name"><br>
<select id="attend">
<option>Will Attend</option>
<option>Cannot Attend</option>
</select><br>

<button class="btn" onclick="rsvp()">Submit</button>
<p id="msg"></p>

</div>

<script>

/* ENTRY FUNCTION */
function enter(){
    let name = document.getElementById("guestName").value;

    if(!name){
        alert("Please enter your name");
        return;
    }

    // hide entry, show main
    document.getElementById("entry").style.display="none";
    document.getElementById("main").style.display="block";

    // welcome name
    document.getElementById("welcomeText").innerText = "Welcome " + name + " 💛";

    // 🎵 PLAY MUSIC مباشرة بعد الاسم
    let audio = document.getElementById("music");
    audio.play().catch(()=>{});
}

/* COUNTDOWN */
let wedding = new Date("Jan 1, 2027 21:00:00").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let diff = wedding - now;

    document.getElementById("d").innerText=Math.floor(diff/(1000*60*60*24));
    document.getElementById("h").innerText=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText=Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText=Math.floor((diff%(1000*60))/1000);
},1000);

/* RSVP */
function rsvp(){
    let name=document.getElementById("name").value;
    let attend=document.getElementById("attend").value;

    if(name){
        document.getElementById("msg").innerHTML =
        "Thank you " + name + " 💛 (" + attend + ")";
    }
}

</script>

</body>
</html>
